services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/restaurant_manager
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-please-override-this-with-a-real-32-byte-plus-secret}
      ORDER_BASE_URL: ${ORDER_BASE_URL:-https://order.example.com}
    ports:
      - "8080:8080"

volumes:
  pgdata:
